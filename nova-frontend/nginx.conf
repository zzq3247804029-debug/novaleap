server {
    listen       80;
    server_name  localhost;

    # 启用 Gzip 压缩，满足构建下发 < 800KB 需求
    gzip on;
    gzip_min_length 1k;
    gzip_buffers 4 16k;
    gzip_http_version 1.1;
    gzip_comp_level 6;
    gzip_types text/plain application/json application/javascript application/x-javascript text/css application/xml text/javascript image/jpeg image/gif image/png;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # 支持 Vue Router HTML5 History 模式
        try_files $uri $uri/ /index.html;
    }

    # API 接口反向代理到 backend 容器组
    location /api/ {
        proxy_pass http://nova-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 核心：必须为 SSE 流式输出关闭缓存以避免输出截断或打包
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }
}
