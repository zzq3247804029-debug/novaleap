spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/novaleap?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:ak_2nN6YE1g754j6vF7vy83W5Jc0nR7j}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.longcat.chat/openai}
      chat:
        options:
          model: ${LONGCAT_MODEL:LongCat-Flash-Chat}
      usage:
        enabled: true
        max-tokens: 500000
        fallback-model: ${LONGCAT_MODEL_FALLBACK:LongCat-Flash-Lite}
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema-note-interactions.sql,classpath:schema-note-audit.sql,classpath:schema-question-banks.sql,classpath:schema-question-mastery.sql,classpath:schema-question-categories.sql

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

nova:
  startup:
    username-guard:
      enabled: ${NOVA_STARTUP_USERNAME_GUARD_ENABLED:true}
  jwt:
    secret: ${NOVA_JWT_SECRET:NovaLeap7SecretKeyNovaLeap7SecretKeyNovaLeap7SecretKeyNovaLeap7SecretKey}
