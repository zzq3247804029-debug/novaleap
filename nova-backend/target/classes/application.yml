server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: nova-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

nova:
  startup:
    username-guard:
      enabled: ${NOVA_STARTUP_USERNAME_GUARD_ENABLED:false}
  jwt:
    expiration: ${NOVA_JWT_EXPIRATION:604800000}
  turnstile:
    enabled: ${NOVA_TURNSTILE_ENABLED:false}
    secret: ${NOVA_TURNSTILE_SECRET:}
  mail:
    resend:
      api-key: ${NOVA_RESEND_API_KEY:re_G9zFtpzu_9xAatvWRCtZDnbz13z8S7hLH}
      from: ${NOVA_RESEND_FROM:NovaLeap <zhiqi@novaleap.xyz>}
  ai:
    web:
      enabled: ${NOVA_AI_WEB_ENABLED:true}
      weather-enabled: ${NOVA_AI_WEB_WEATHER_ENABLED:true}
      search-enabled: ${NOVA_AI_WEB_SEARCH_ENABLED:true}
      request-timeout-ms: ${NOVA_AI_WEB_TIMEOUT_MS:1200}
