spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      database: ${SPRING_DATA_REDIS_DATABASE:0}
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:sk-disabled-placeholder}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.longcat.chat/openai}
      chat:
        options:
          model: ${LONGCAT_MODEL:LongCat-Flash-Chat}
      usage:
        enabled: true
        max-tokens: ${SPRING_AI_OPENAI_MAX_TOKENS:500000}
        fallback-model: ${LONGCAT_MODEL_FALLBACK:LongCat-Flash-Lite}
  sql:
    init:
      mode: never
      continue-on-error: false

nova:
  jwt:
    secret: ${NOVA_JWT_SECRET}
